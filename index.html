<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator - Built for Digital Heroes</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#ffffff;
    width:100%;
    max-width:450px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

input[type="date"]{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
    margin-bottom:15px;
}

.calculate-btn{
    background:#007bff;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    width:100%;
}

.calculate-btn:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#28a745;
}

.info{
    margin-top:25px;
    padding-top:20px;
    border-top:1px solid #ddd;
    text-align:left;
}

.info h3{
    margin-bottom:10px;
    color:#333;
}

.info p{
    margin:8px 0;
    color:#555;
}

.hero-btn{
    margin-top:20px;
    background:#28a745;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.hero-btn:hover{
    background:#1f8a37;
}

.link-text{
    margin-top:15px;
}

.link-text a{
    color:#007bff;
    text-decoration:none;
    font-weight:bold;
}

.link-text a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

    <h1>Age Calculator</h1>

    <p class="subtitle">
        Calculate your age instantly
    </p>

    <input type="date" id="dob">

    <button class="calculate-btn" onclick="calculateAge()">
        Calculate Age
    </button>

    <div class="result" id="result"></div>

    <div class="info">
        <h3>Developer Information</h3>

        <p>
            <strong>Full Name:</strong>
            Shobhit Maurya
        </p>

        <p>
            <strong>Email:</strong>
            mailofshobhit2005@gmail.com
        </p>
    </div>

    <button
        class="hero-btn"
        onclick="window.open('https://digitalheroesco.com','_blank')">
        Built for Digital Heroes
    </button>

    <div class="link-text">
        Visit:
        <a href="https://digitalheroesco.com" target="_blank">
            Digital Heroes
        </a>
    </div>

</div>

<script>

function calculateAge(){

    let dob = document.getElementById("dob").value;

    if(dob === ""){
        alert("Please select your Date of Birth");
        return;
    }

    let birthDate = new Date(dob);
    let today = new Date();

    let age = today.getFullYear() - birthDate.getFullYear();

    let monthDiff = today.getMonth() - birthDate.getMonth();

    if(
        monthDiff < 0 ||
        (monthDiff === 0 &&
        today.getDate() < birthDate.getDate())
    ){
        age--;
    }

    document.getElementById("result").innerHTML =
        "Your Age is " + age + " Years";
}

</script>

</body>
</html>
